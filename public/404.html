<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Zeronia</title>
    <script>
      // GitHub Pages SPA fallback: encode the requested path into the query
      // string and bounce to index.html, which restores it before the app loads.
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.host + "/?/" +
        l.pathname.slice(1).replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
